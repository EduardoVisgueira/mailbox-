<script>
async function carregarCarta() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) return;

    try {
        const response = await fetch(window.MAILBOX_API + '?action=messages');
        const messages = await response.json();
        const carta = messages.find(m => m.id === id);

        if (carta) {
            document.getElementById('email-titulo').textContent = carta.titulo;
            document.getElementById('email-corpo').innerHTML = carta.conteudo;
        } else {
            document.getElementById('email-corpo').textContent = 'Carta não encontrada.';
        }
    } catch (err) {
        document.getElementById('email-corpo').textContent = 'Erro ao carregar a carta. Tente novamente.';
    }
}
window.onload = carregarCarta;
</script>

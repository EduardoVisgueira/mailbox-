<div class="deco-small"></div></div>
<div class="box" style="height: 480px; overflow: hidden;">
    <h2>Mensagens</h2>
    <div class="entries">
        <p style="padding:10px;">Carregando mensagens...</p>
        </div>
</div>
<div class="box" style="height: 130px;">
<iframe id="spotify-player" data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/2LKOHdMsL0K9KwcPRlJK2v?utm_source=generator&theme=0" width="100%" height="80px" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
<div style="display:flex; justify-content:space-between; align-items:center; padding-top:6px; font-size:10px;">
  <a href="#" onclick="prevTrack(); return false;">← anterior</a>
  <span id="track-counter">1 / 2</span>
  <a href="#" onclick="nextTrack(); return false;">próxima →</a>
</div>
</div>
<script>
let tracks = [];
let currentTrack = 0;
function initPlayer(tracksStr) {
  tracks = (tracksStr || '').split(',').map(s => s.trim()).filter(Boolean);
  if (!tracks.length) return;
  currentTrack = 0;
  updatePlayer();
}
function updatePlayer() {
  if (!tracks.length) return;
  document.getElementById('spotify-player').src =
    `https://open.spotify.com/embed/track/${tracks[currentTrack]}?utm_source=generator&theme=1`;
  document.getElementById('track-counter').textContent = `${currentTrack + 1} / ${tracks.length}`;
}
function nextTrack() { currentTrack = (currentTrack + 1) % tracks.length; updatePlayer(); }
function prevTrack() { currentTrack = (currentTrack - 1 + tracks.length) % tracks.length; updatePlayer(); }
</script>
        <div class="box">
<div class="deco-small"></div></div>
      </section>
    </main>
</div>
</div>
</div>

<script>
async function logout() {
    await window.db.auth.signOut();
    window.location.href = 'login.html';
}

let meuNick = '';
let currentUserId = '';

async function carregarSidebar(userId) {
    const { data: perfil } = await window.db
        .from('profiles').select('nick,nome,quote,status,avatar_url,spotify_tracks').eq('id', userId).single();
    if (!perfil) return;
    meuNick = perfil.nick || '';
    const nickSlug = (perfil.nick || '').replace('@', '');
    const perfilUrl = 'perfil.html?nick=' + encodeURIComponent(nickSlug);
    if (perfil.avatar_url) document.getElementById('sb-avatar').src = perfil.avatar_url;
    document.getElementById('sb-link-perfil').href = perfilUrl;
    document.getElementById('sb-nick').href = perfilUrl;
    document.getElementById('sb-link-ver-perfil').href = perfilUrl;
    document.getElementById('sb-nick').textContent = perfil.nick || '';
    document.getElementById('sb-nome').textContent = perfil.nome || '';
    document.getElementById('sb-quote').textContent = `"${perfil.quote || ''}"`;
    document.getElementById('sb-status').textContent = 'Online agora';
    initPlayer(perfil.spotify_tracks);
}

async function deletarMensagem(id, el) {
    if (!confirm('apagar essa mensagem?')) return;
    const { error } = await window.db.from('messages').delete().eq('id', id);
    if (!error) el.closest('.entries-grid').remove();
}

async function carregarCaixaDeEntrada() {
    const { data: { session } } = await window.db.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    currentUserId = session.user.id;
    const { error: lsErr } = await window.db.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', currentUserId);
    if (lsErr) console.error('last_seen update failed:', lsErr.message);
    setInterval(() => {
        window.db.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', currentUserId);
    }, 60000);
    await carregarSidebar(session.user.id);

    const container = document.querySelector('.entries');
    const { data: messages, error } = await window.db
        .from('messages')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) {
        container.innerHTML = '<p style="padding:10px;">Erro ao carregar mensagens. Tente atualizar a página.</p>';
        return;
    }

    container.innerHTML = '';

    if (!messages.length) {
        container.innerHTML = '<p style="padding:10px;">Nenhuma mensagem encontrada.</p>';
        return;
    }

    messages.forEach(msg => {
        const date = new Date(msg.created_at).toLocaleDateString('pt-BR');
        const isMeu = msg.sender_id === currentUserId;
        const entryHtml = `
            <div class="entries-grid" style="position:relative;"><div class="entries-grid-img"></div>
                <a href="mail.html?id=${encodeURIComponent(msg.id)}">
                    <h4>${msg.titulo}</h4>
                    <small>enviado por ${msg.remetente} em ${date}</small>
                </a>
                ${isMeu ? `<span onclick="event.stopPropagation(); event.preventDefault(); deletarMensagem('${msg.id}', this)" title="apagar" style="position:absolute; top:50%; right:8px; transform:translateY(-50%); font-size:18px; color:#8f90aa; z-index:10; padding:4px 5px; border:1px solid transparent; line-height:1;" onmouseover="this.style.borderColor='#8f90aa';this.style.color='#ff6060';" onmouseout="this.style.borderColor='transparent';this.style.color='#8f90aa';">🗑</span>` : ''}
            </div>
        `;
        container.insertAdjacentHTML('beforeend', entryHtml);
    });
}
window.onload = carregarCaixaDeEntrada;
</script>
<script src="theme.js"></script>

</body>
</html>
